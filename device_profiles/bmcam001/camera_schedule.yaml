# bmcam001 production schedule profile.
# bmcam001 uses the Pi hardware RTC because its older BM serial bridge firmware
# does not reliably provide spotter/utc-time messages.
time_source: "rtc"

timezone_preset: "sf"
timezone: "America/Los_Angeles"

enforce_time_window: true
enforce_spotter_time_window: true

# Development window. Change to 12:00-15:00 for reef production if desired.
transmit_window:
  start: "00:01"
  end: "23:59"

set_system_clock_from_spotter: false
spotter_time_timeout_seconds: 60
allow_system_clock_fallback: false
uart_port: "/dev/ttyAMA0"
baudrate: 115200

rtc:
  hwclock_path: "/usr/sbin/hwclock"
  set_system_clock_from_rtc: true
  require_plausible_after_utc: "2026-01-01T00:00:00+00:00"

image:
  resolution_key: "720p"
  image_quality: 25
