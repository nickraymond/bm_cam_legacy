# Local deployment schedule for legacy BM camera production runtime.
#
# time_source controls where the app gets UTC for the transmit-window decision:
#   spotter_utc -> subscribe to BM/Spotter topic spotter/utc-time. Use for bmcam002.
#   rtc         -> set/read Linux time from Pi hardware RTC using hwclock. Use for bmcam001.
#   system      -> bench-only fallback; not recommended for production.
time_source: "spotter_utc"

timezone_preset: "sf"
timezone: "America/Los_Angeles"

enforce_time_window: true
enforce_spotter_time_window: true

transmit_window:
  start: "08:00"
  end: "15:00"

set_system_clock_from_spotter: true
spotter_time_timeout_seconds: 60
allow_system_clock_fallback: false
uart_port: "/dev/ttyAMA0"
baudrate: 115200

rtc:
  hwclock_path: "/usr/sbin/hwclock"
  set_system_clock_from_rtc: true
  require_plausible_after_utc: "2026-01-01T00:00:00+00:00"

# Legacy Picamera2 fallback settings. These remain for rollback by setting
# image_pipeline.enabled: false.
image:
  resolution_key: "720p"
  image_quality: 25

# DEV bmcam000 libcamera/rpicam image pipeline.
# Coordinate system: crop x/y/w/h are in native full JPEG coordinates.
# Spatial density is the output size after cropping/downsampling.
# First test setting: native 4608x2592 -> fixed 3072x1728 crop -> 3072x1728 output -> HEIC Q20.
image_pipeline:
  enabled: true
  capture_backend: "rpicam"

  source:
    width: 4608
    height: 2592
    jpeg_quality: 95

  crop:
    mode: "fixed"
    x: 768
    y: 432
    w: 3072
    h: 1728

  spatial:
    output_width: 3072
    output_height: 1728
    resample: "lanczos"

  heic:
    quality: 20

# Bristlemouth/Sofar image-transfer settings.
# network_type:
#   0x01 / 1 = legacy sat/cell fallback queue
#   0x02 / 2 = cellular-only queue
# Keep image_buffer_size at 300 for this test; do not change the working chunking path.
bm_serial:
  network_type: 0x02
  image_buffer_size: 300
  image_transmit_delay_seconds: 5

